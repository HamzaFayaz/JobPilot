name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Prepare server (directory + Docker)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${EC2_USER}@${EC2_HOST}" \
            "sudo mkdir -p /opt/jobpilot/data/uploads && sudo chown -R ubuntu:ubuntu /opt/jobpilot"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${EC2_USER}@${EC2_HOST}" 'bash -s' < deploy/bootstrap-ec2.sh || true

      - name: Sync application to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'data/jobpilot.db' \
            --exclude 'data/uploads' \
            --exclude '.env' \
            --exclude '.cursor' \
            ./ "${EC2_USER}@${EC2_HOST}:/opt/jobpilot/"

      - name: Write production .env on server
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DOMAIN: ${{ secrets.DOMAIN }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          QWEN_BASE_URL: ${{ secrets.QWEN_BASE_URL }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL }}
          PROFILE_LLM_MODEL: ${{ secrets.PROFILE_LLM_MODEL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          GH_OAUTH_REDIRECT_URI: ${{ secrets.GH_OAUTH_REDIRECT_URI }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${EC2_USER}@${EC2_HOST}" \
            "FRONTEND_URL='${FRONTEND_URL}' \
             DOMAIN='${DOMAIN}' \
             DASHSCOPE_API_KEY='${DASHSCOPE_API_KEY}' \
             QWEN_BASE_URL='${QWEN_BASE_URL}' \
             QWEN_MODEL='${QWEN_MODEL}' \
             PROFILE_LLM_MODEL='${PROFILE_LLM_MODEL}' \
             GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}' \
             GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}' \
             GOOGLE_REDIRECT_URI='${GOOGLE_REDIRECT_URI}' \
             GH_OAUTH_CLIENT_ID='${GH_OAUTH_CLIENT_ID}' \
             GH_OAUTH_CLIENT_SECRET='${GH_OAUTH_CLIENT_SECRET}' \
             GH_OAUTH_REDIRECT_URI='${GH_OAUTH_REDIRECT_URI}' \
             bash -s" < deploy/write-env.sh

      - name: Build and restart Docker containers
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${EC2_USER}@${EC2_HOST}" 'bash -s' < deploy/remote-update.sh
